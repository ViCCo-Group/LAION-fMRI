name: Build and Deploy Docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to herbert
        uses: appleboy/ssh-action@v1
        with:
          host: 85.214.87.238
          username: johannes
          key: ${{ secrets.HERBERT_SSH_KEY }}
          script: |
            set -e
            cd /opt/laion-fmri
            git fetch origin main
            git reset --hard origin/main
            /opt/venvs/laion-fmri/bin/pip install --quiet --upgrade \
              'sphinx>=4.0' 'sphinx-rtd-theme>=1.0' myst-parser \
              sphinx-copybutton sphinx-design sphinx-tabs numpydoc \
              sphinx-gallery
            . /opt/venvs/laion-fmri/bin/activate
            make -C docs clean html
